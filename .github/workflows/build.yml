name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: read properties
        id: props
        run: |
          echo "java_version=$(grep 'targetJavaVersion' build.gradle | head -n 1 | awk -F'= ' '{print $2}' || echo '25')" >> $GITHUB_OUTPUT
          echo "mc_version=$(grep 'minecraft_version' gradle.properties | cut -d'=' -f2)" >> $GITHUB_OUTPUT

      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.props.outputs.java_version }}
          distribution: 'microsoft'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build
        run: ./gradlew build

      - name: remove *-sources.jar
        run: rm -f ./build/libs/*-sources.jar || true

      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts-${{ steps.props.outputs.mc_version }}
          path: build/libs/

      - name: create automatic release
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest"
          name: "Latest Build (${{ steps.props.outputs.mc_version }})"
          draft: false
          prerelease: false
          files: ./build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
